---
# Codacy configuration.
# The per-tool config files (.jshintrc, .remarkrc.yaml, .prospector.yaml,
# pyproject.toml [tool.pylint]/[tool.bandit]) handle rule tuning. As a backstop
# we exclude generated/vendored-style assets and docs from Codacy's style
# engines, since they only produce cosmetic findings (semicolons, link refs).
# Note: this affects Codacy only — GitHub CodeQL security scanning is unaffected.
exclude_paths:
  - 'extension/media/**'
  - 'extension/CHANGELOG.md'
  - '**/test_*.py'
  - 'test_hover.py'
  - '**/out/**'
  - '**/dist/**'
  - '**/node_modules/**'
