# Prospector configuration for Python Hover extension.
# Project requires Python 3.10+ — many Prospector warnings are false positives.

py-version: 3.10

max-line-length: 120

pep8:
  disable:
    # PEP 604 union syntax (dict[str, str], list[str]) is valid in Python 3.9+.
    - W605

pylint:
  disable:
    # PEP 604 subscripted builtins are valid in Python 3.9+.
    - unsubscriptable-object
    # ast.Match / ast.pattern are Python 3.10+ features — pylint doesn't know.
    - no-member
    # These functions legitimately have many branches/returns for AST traversal.
    - too-many-branches
    - too-many-return-statements
    # These functions legitimately have many local variables for AST traversal.
    - too-many-locals
    # Helper scripts: docstrings/naming/style are intentionally relaxed.
    - missing-module-docstring
    - missing-class-docstring
    - missing-function-docstring
    - invalid-name
    - line-too-long
    - multiple-statements
    - bad-continuation
    - broad-except
    - broad-exception-caught
    - too-few-public-methods
    - too-many-ancestors
    - too-many-instance-attributes
    - too-many-arguments
    - too-many-statements
    - inconsistent-return-statements
    - chained-comparison

mccabe:
  run: true
  options:
    max-complexity: 50
