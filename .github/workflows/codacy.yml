name: "Codacy Security Scan"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Run weekly on Mondays at 6am UTC (same cadence as CodeQL)
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  codacy-security-scan:
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Runs the Codacy Analysis CLI locally and produces SARIF.
      # It honours the in-repo config files: codacy.yaml (excluded paths),
      # pyproject.toml [tool.pylint]/[tool.bandit], .prospector.yaml,
      # .jshintrc and .remarkrc.yaml — so the previously-noisy style rules
      # are suppressed. No Codacy account/token is required for this path.
      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@562ee3e92b8e92df8b67e0a5ff8aa8e261919c08 # v4.4.7
        with:
          output: results.sarif
          format: sarif
          # Make the SARIF compatible with GitHub code scanning.
          gh-code-scanning-compat: true
          # Never fail the build on findings — they surface as alerts instead.
          max-allowed-issues: 2147483647

      # Codacy can emit zero-length or invalid runs; guard the upload.
      - name: Upload SARIF results to GitHub code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
