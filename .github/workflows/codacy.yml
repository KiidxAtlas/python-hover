name: "Codacy Security Scan"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Run weekly on Mondays at 6am UTC (same cadence as CodeQL)
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  codacy-security-scan:
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    # Hard cap so a stuck tool can never hang the run indefinitely.
    timeout-minutes: 25
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Runs the Codacy Analysis CLI locally and produces SARIF.
      # It honours the in-repo config files: codacy.yaml (excluded paths),
      # pyproject.toml [tool.pylint]/[tool.bandit], .prospector.yaml,
      # .jshintrc and .remarkrc.yaml — so the previously-noisy style rules
      # are suppressed. No Codacy account/token is required for this path.
      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@562ee3e92b8e92df8b67e0a5ff8aa8e261919c08 # v4.4.7
        with:
          output: results.sarif
          format: sarif
          # Make the SARIF compatible with GitHub code scanning.
          gh-code-scanning-compat: true
          # Never fail the build on findings — they surface as alerts instead.
          max-allowed-issues: 2147483647
          # Bound each tool so a single slow/stuck tool can't stall the run.
          tool-timeout: "8minutes"
          # Skip the uncommitted-files check (full-repo scan in CI).
          skip-uncommitted-files-check: true

      # Only upload if the scan actually produced a SARIF file (a timed-out or
      # failed scan leaves none, in which case we skip rather than error).
      - name: Check SARIF exists
        id: sarif
        run: |
          if [ -s results.sarif ]; then echo "exists=true" >> "$GITHUB_OUTPUT";
          else echo "exists=false" >> "$GITHUB_OUTPUT"; fi

      - name: Upload SARIF results to GitHub code scanning
        if: steps.sarif.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
